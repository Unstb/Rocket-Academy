<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Творческий режим 🎨</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2b0a3d, #4b1a75);
    color: #fff;
}

header {
    padding: 15px 20px;
    background: rgba(0,0,0,0.4);
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.section {
    padding: 40px 20px;
    text-align: center;
}

.video-box {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 20px;
    max-width: 800px;
    margin: auto;
}

iframe {
    width: 100%;
    height: 400px;
    border-radius: 15px;
    border: none;
}

.btn {
    background: #f5f0e1;
    color: #2b0a3d;
    font-weight: bold;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">🚀 Rocket Academy</div>
</header>

<section class="section">
    <h1>🎨 Творческий режим</h1>
    <p>Смотри и вдохновляйся 🚀</p>

    <div class="video-box">

        <!-- Видео 1 -->
        <iframe 
            src="https://vk.com/video_ext.php?oid=-186905461&id=456240130"
            allowfullscreen>
        </iframe>

        <br><br>

        <!-- Видео 2 -->
        <iframe src="https://vk.com/video_ext.php?oid=-83520452&id=456239558"
        width="100%" height="400"
        frameborder="0"
        allowfullscreen>
        </iframe>
        <br><br>

        <!-- Видео 3 -->
        <iframe src="https://vk.com/video_ext.php?oid=-52969542&id=456240790"
        width="100%" height="400"
        frameborder="0"
        allowfullscreen>
        </iframe>
    </div>
    <button class="btn" onclick="goBack()">⬅ Назад</button>
</section>

<script>
function goBack() {
    window.close();
}
</script>

</body>
</html>
